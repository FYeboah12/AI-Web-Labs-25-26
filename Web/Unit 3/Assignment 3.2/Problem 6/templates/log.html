<!DOCTYPE html>
<html>

<head>
	<style>

		body {
			font-family: Ubuntu;
            font-size: 1.5em;
            text-align: center;
            margin: 20px;
		}
        table, td, th {
        border: 1px solid;
        padding: 10px;
        }
        table{
            border-collapse: collapse;
        }
    </style>
</head>
<body>
<h1>Hello! This is Problem 6</h1>
<table>
<tr>
<th><b>IP Address:</b></th>
<th><b>Browser:</b></th>
<th><b>Current time:</b></th>
</tr>
{% for entry in info_list %}
<tr>
  <td> {{ entry.ip }}</td>
  <td>{{ entry.browser }}</td>
  <td>{{ entry.current_time }}</td>
  </tr>
{% endfor %}
</table>


</body>

</html>
