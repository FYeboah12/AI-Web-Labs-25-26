<!DOCTYPE html>
<html>

<head>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');
		body {
			font-family: Ubuntu;
            text-align: center;
            font-size: 1.75em;
		}
    </style>
</head>
<body>
<h1>Hello! This is Problem 7</h1>
{% for day in schedule.results %}
    <h3>{{ day.date }}</h3>
    <h2 style="color: blue">{{ day.day_type.name}}</h2>
    <div style="display:flex; gap:2rem; flex-wrap:wrap; justify-content:center; padding: 10px;">
        {% for block in day.day_type.blocks %}
            <div class="card" style="border: 1px solid black; padding: 20px; background-color: lightblue;"><b>{{ block.name }}</b>
            <div class="card_times">{{ block.start }} - {{ block.end }}</div>
            </div>
        {% endfor %}
    </div>
{% endfor %}

</body>

</html>
