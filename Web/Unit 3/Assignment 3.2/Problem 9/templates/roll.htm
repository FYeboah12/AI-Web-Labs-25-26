<!DOCTYPE html>
<html>

<head>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');
		body {
			font-family: Ubuntu;
			text-align: center;
		}
		.tile{
			justify-content: center;
			display: flex;
			flex-wrap: wrap;
			font-size: 10em;
		}
		span{
			background-color: coral;
		}
    </style>
</head>
<body>
<h1>Hello! This is Problem 9</h1>
<h2><span>Number of Sides: {{sides}}</span></h2>
<h2><span>Number of Dice: {{dice}}</span></h2>
<h1>Dice roll:</h1>
<div class="tile">
	{% for roll in val %}
	<h1 style="border: 2px dotted black; padding: 10px; margin: 15px;">{{roll}}</h1>
	{% endfor %}
</div>
</body>

</html>
