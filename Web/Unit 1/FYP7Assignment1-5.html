            .schoolbell-regular {

                font-weight: 400;

                }

            p{

            }
            .challenge{

            }
            .div1{
                background-color: burlywood;
                border: solid;
                width: auto;
                height: auto;
                margin: auto;
            }
            .div2{
                background-color: #EFA8B8;
                border: solid;
                width: 275px;
                height: 100px;
                margin: 25px;
            }
            .div3{
                background-color: #B8BEDD;

                display: inline-block; 
            }
            .main{
                width: 120px;
                background-color: skyblue;
                margin-left: auto;
                margin-right: auto;
            }
            .outer{
                border: solid;
                border-radius: 10%;
                padding: 15%;
                display: flex;
                justify-content: space-evenly;
            }
            span{
                background-color: yellow;
                padding: 5px;
            }
            .container{

                justify-content: space-between;
            }
            .left{
                border: dotted darkcyan;
                padding: 25px;
                float: left;
            }
            .right{
                border: dotted darkcyan;

                float: right;
            }
